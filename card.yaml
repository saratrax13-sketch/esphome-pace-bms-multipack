      - type: tile
        entity: sensor.pace_bms_multipack_combined_total_current
        name: Total Current
      - type: tile
        entity: sensor.pace_bms_multipack_combined_total_power
        name: Total Power
      - type: tile
        entity: sensor.pace_bms_multipack_combined_total_remaining_capacity
        name: Remaining Capacity
      - type: tile
        entity: sensor.pace_bms_multipack_combined_total_full_capacity
        name: Full Capacity
      - type: tile
        entity: sensor.pace_bms_multipack_combined_total_design_capacity
        name: Design Capacity
      - type: tile
        entity: sensor.pace_bms_multipack_combined_total_detected_cell_count
        name: Total Detected Cells
      - type: tile
        entity: sensor.pace_bms_multipack_combined_worst_delta_cell_voltage
        name: Worst Cell Delta
      - type: tile
        entity: sensor.pace_bms_multipack_combined_projected_runtime
        name: Projected Runtime
      - type: tile
        entity: sensor.pace_bms_multipack_combined_projected_charging_time
        name: Charging Time to Full

