    show_header_toggle: false
    entities:
      - entity: sensor.pace_bms_multipack_combined_projected_runtime
        name: Combined Runtime Remaining
      - entity: sensor.pace_bms_multipack_combined_projected_charging_time
        name: Combined Charging Time to Full
      - entity: sensor.pace_bms_multipack_pack_1_projected_runtime
        name: Pack 1 Runtime Remaining
      - entity: sensor.pace_bms_multipack_pack_1_projected_charging_time
        name: Pack 1 Charging Time to Full
      - entity: sensor.pace_bms_multipack_pack_2_projected_runtime
        name: Pack 2 Runtime Remaining
      - entity: sensor.pace_bms_multipack_pack_2_projected_charging_time
        name: Pack 2 Charging Time to Full

      # OPTIONAL PACK 3 - uncomment when Pack 3 is enabled in ESPHome
      # - entity: sensor.pace_bms_multipack_pack_3_projected_runtime
      #   name: Pack 3 Runtime Remaining
      # - entity: sensor.pace_bms_multipack_pack_3_projected_charging_time
