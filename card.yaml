        entity: sensor.pace_bms_multipack_combined_state_of_charge
        name: Combined SOC
      - type: tile
        entity: sensor.pace_bms_multipack_combined_state_of_health
        name: Combined SOH
      - type: tile
        entity: sensor.pace_bms_multipack_combined_average_pack_voltage
