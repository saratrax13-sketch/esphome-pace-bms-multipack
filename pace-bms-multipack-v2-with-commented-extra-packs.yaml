    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      if (x < 0 || x > 100) return NAN;
      return x;

