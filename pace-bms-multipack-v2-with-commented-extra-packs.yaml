# ============================================================
# PACE BMS Multipack RS485 Monitor
# Version: 2026-05-14 v2.1 - generic PACE BMS multipack with commented Pack 3/4 expansion blocks
# ============================================================
#
# PURPOSE
#   Fresh ESP32 that reads multiple PACE RS485/Modbus battery packs on one shared RS485 bus.
#   This does NOT replace the old brand-specific Master and Slave YAML files until you decide
#   to retire them. The old setup can remain as fallback during testing.
#
# PHYSICAL PACK LAYOUT / MODBUS ADDRESS MAP
#   Pack 1 / Master = Modbus address 0x01
#   Pack 2 / Slave 1 = Modbus address 0x02
#   Pack 3 / Slave 2 = Modbus address 0x03  (future expansion)
#   Pack 4 / Slave 3 = Modbus address 0x04  (future expansion)
#
# ACTIVE PACKS IN THIS FILE
#   This v2 base file actively monitors Pack 1 and Pack 2.
#   Full Pack 3 and Pack 4 code blocks are included below, but commented out.
#   Uncomment those blocks only when the physical packs are installed and their
#   Modbus addresses are confirmed.
#
# MQTT LAYOUT
#   New clean MQTT topic prefix: pace_bms/multipack
#   This avoids conflict with the old Master/Slave MQTT devices.
#
# CELL DETECTION STRATEGY
#   Each pack is read as if it could have up to 16 cells.
#   The code only counts cell registers with realistic lithium cell voltages.
#   This supports 13S PACE/Hubble-style packs and 16S PACE packs where the BMS exposes valid cell registers.
#
# LIVE DATA TRUST STRATEGY
#   The dashboard should only show fresh actual values.
#   Invalid values are rejected as NAN.
#   Live numeric sensors have timeout filters so stale values become unavailable.
#   Timeout is set to 600s because this full YAML exposes many Pack 1 / Pack 2
#   sensors and the complete polling queue can exceed 90s.
#   Combined values require both Pack 1 and Pack 2 data; if one pack is not fresh,
#   the combined total also becomes unavailable instead of showing a partial total.
#
# PARALLEL BATTERY RULES
#   Capacity/current/power can be added across packs.
#   Pack voltage must NOT be added when batteries are in parallel.
#   Combined voltage is calculated as an average of valid pack voltages.
#
# IMPORTANT RS485 NOTE
#   Do not permanently leave multiple ESP32 devices polling the same BMS bus
#   if readings become unstable. Use the old Master/Slave ESP32s for comparison
#   during commissioning, then keep only one polling solution active long-term.
#
# ============================================================

# ------------------------------------------------------------
# GLOBAL SUBSTITUTIONS
# ------------------------------------------------------------
# Central place for device name and RS485 pin mapping.
# Change pins here only if your RS485 module is wired differently.

substitutions:
  name: pace-bms-multipack
  device_description: "Generic PACE RS485/Modbus multipack battery monitor with automatic cell-count detection"
  tx_pin: GPIO16
  rx_pin: GPIO17
  flow_control_pin: GPIO18
  # Live data timeout: if a live numeric sensor does not receive a fresh
  # valid value within this period, Home Assistant will show unavailable.
  # Set to 600s to avoid false unavailable states while the full Pack 1 +
  # Pack 2 + cell + temperature + status polling queue completes.
  # This still prevents stale values from being held indefinitely.
  live_data_timeout: 600s
  # Static data timeout: used only for slow-changing values that are polled
  # less often, such as full/design capacity and cycle count.
  static_data_timeout: 3600s

# ------------------------------------------------------------
# ESPHOME DEVICE IDENTITY
# ------------------------------------------------------------
# This is a fresh node so Home Assistant/MQTT discovery creates a new device.

esphome:
  name: ${name}
  friendly_name: "PACE BMS Multipack"
  comment: ${device_description}
  min_version: 2024.6.0

# ------------------------------------------------------------
# ESP32 BUILD TARGET
# ------------------------------------------------------------
# Uses ESP-IDF as per the existing stable Pack 1 / Pack 2 monitor pattern.

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.0"
      sram1_as_iram: true

# ------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------
# WARN keeps production logging quiet. Temporarily change to INFO/DEBUG for
# commissioning if you need to see cell-detection or Modbus troubleshooting.

logger:
  level: WARN

# ------------------------------------------------------------
# ESPHOME API / OTA
# ------------------------------------------------------------
# API allows ESPHome/Home Assistant management. MQTT remains the main sensor
# publishing method in this configuration.

api:
  encryption:
    key: !secret api_key_combined

ota:
  - platform: esphome
    password: !secret ota_password_combined

# ------------------------------------------------------------
# WIFI CONFIGURATION
# ------------------------------------------------------------
# Static IP is intentional so the device is easy to find during maintenance.
# Change 192.168.10.213 if it conflicts with your network.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  reboot_timeout: 15min

  manual_ip:
    static_ip: 192.168.10.213
    gateway: 192.168.10.1
    subnet: 255.255.255.0
    dns1: 192.168.10.1

  ap:
    ssid: "PACE BMS Multipack Fallback"
    password: !secret combined_fallback_password

# ------------------------------------------------------------
# MQTT CONFIGURATION
# ------------------------------------------------------------
# Fresh topic prefix for the combined monitor. This avoids overwriting or
# confusing the existing older brand-specific Master/Slave devices.

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: !secret mqtt_port
  topic_prefix: pace_bms/multipack
  discovery: true
  discovery_retain: true
  discovery_unique_id_generator: mac
  discovery_object_id_generator: device_name
  idf_send_async: true
  keepalive: 15s
  reboot_timeout: 0s
  publish_nan_as_none: true
  log_topic: null

# ------------------------------------------------------------
# LOCAL WEB SERVER
# ------------------------------------------------------------
# Useful for quick commissioning checks directly from a browser.

web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# ------------------------------------------------------------
# UART / RS485 HARDWARE BUS
# ------------------------------------------------------------
# GPIO16 = TX, GPIO17 = RX, GPIO18 = DE/RE flow control.
# All packs share this RS485 bus, but each pack must have a unique Modbus address.

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    stop_bits: 1
    rx_buffer_size: 512

# ------------------------------------------------------------
# MODBUS BUS SETTINGS
# ------------------------------------------------------------
# send_wait_time helps the RS485 transceiver settle between requests.

modbus:
  - id: modbus0
    uart_id: uart_0
    flow_control_pin: ${flow_control_pin}
    send_wait_time: 250ms

# ------------------------------------------------------------
# MODBUS CONTROLLERS / PHYSICAL BATTERY ADDRESSES
# ------------------------------------------------------------
# Address map used by this v2 file:
#   Pack 1 / Master  = 0x01  -> id: bms_pack_1
#   Pack 2 / Slave 1 = 0x02  -> id: bms_pack_2
#
# Future expansion convention:
#   Pack 3 / Slave 2 = 0x03  -> id: bms_pack_3
#   Pack 4 / Slave 3 = 0x04  -> id: bms_pack_4
#
# IMPORTANT:
# - The physical DIP/address setting on each battery must match this map.
# - Only one RS485 master/poller should normally be active on this bus.
# - Update intervals are staggered to reduce bus congestion.

modbus_controller:
  - id: bms_pack_1
    # Pack 1 / Master address
    address: 0x01
    modbus_id: modbus0
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 20s
    offline_skip_updates: 3

  - id: bms_pack_2
    # Pack 2 / Slave 1 address
    address: 0x02
    modbus_id: modbus0
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 25s
    offline_skip_updates: 3


# ------------------------------------------------------------
# OPTIONAL PACK 3 / SLAVE 2 MODBUS CONTROLLER - COMMENTED OUT
# ------------------------------------------------------------
# To enable this pack:
# 1. Remove '# ' from the lines in this block.
# 2. Confirm the physical battery Modbus address matches the address below.
# 3. Confirm the RS485 A/B bus is daisy-chained to this pack.
# 4. Update the combined calculation section if you want this pack included in totals.
#
#   - id: bms_pack_3
#     # Pack 3 / Slave 2 address
#     address: 0x03
#     modbus_id: modbus0
#     setup_priority: -10
#     command_throttle: 300ms
#     update_interval: 35s
#     offline_skip_updates: 3

# ------------------------------------------------------------
# OPTIONAL PACK 4 / SLAVE 3 MODBUS CONTROLLER - COMMENTED OUT
# ------------------------------------------------------------
# To enable this pack:
# 1. Remove '# ' from the lines in this block.
# 2. Confirm the physical battery Modbus address matches the address below.
# 3. Confirm the RS485 A/B bus is daisy-chained to this pack.
# 4. Update the combined calculation section if you want this pack included in totals.
#
#   - id: bms_pack_4
#     # Pack 4 / Slave 3 address
#     address: 0x04
#     modbus_id: modbus0
#     setup_priority: -10
#     command_throttle: 400ms
#     update_interval: 45s
#     offline_skip_updates: 3

# ============================================================
# BINARY SENSORS
# ============================================================
# Exposes live status bits and per-cell balancing flags.
# These are useful for seeing whether a pack is charging, discharging,
# balancing, or being limited by the BMS.

binary_sensor:
  # ------------------------------------------------------------
  # DEVICE CONNECTION STATUS
  # ------------------------------------------------------------
  # ESPHome online/offline status for the combined ESP32 itself.

  - platform: status
    name: "connection"
    entity_category: diagnostic

  # ------------------------------------------------------------
  # PACK 1 PACK STATUS AND BALANCING BITS
  # ------------------------------------------------------------
  # Register 11 exposes operating state bits.
  # Register 12 exposes balancing bits for cells 1-16.

  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    name: "pack 1 charging operation"
    address: 11
    register_type: holding
    bitmask: 0x0100
  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    name: "pack 1 discharging operation"
    address: 11
    register_type: holding
    bitmask: 0x0200
  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    name: "pack 1 charging"
    address: 11
    register_type: holding
    bitmask: 0x0400
  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    name: "pack 1 discharging"
    address: 11
    register_type: holding
    bitmask: 0x0800
  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    name: "pack 1 cell balancing 1"
    address: 12
    register_type: holding
    bitmask: 0x0001
  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
