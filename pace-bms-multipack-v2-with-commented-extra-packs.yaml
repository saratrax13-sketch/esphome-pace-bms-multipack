  # ------------------------------------------------------------
  # PACK 1 AUTO CELL DETECTION AND CELL HEALTH CALCULATION
  # ------------------------------------------------------------
  # Reads registers 15-30 as possible cell voltages.
  # Counts only realistic lithium cell values between 2.0V and 5.0V.
  # Calculates min, max, average, delta, and detected cell count.
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    id: pack_1_delta_cell_voltage
    name: "pack 1 delta cell voltage"
    address: 15
    register_type: holding
    value_type: U_WORD
    register_count: 16
    response_size: 32
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      const uint8_t max_cells = 16;
      if (data.size() < max_cells * 2) return NAN;

      float min_cell_voltage = 100.0f;
      float max_cell_voltage = -100.0f;
      float total_cell_voltage = 0.0f;
      uint8_t valid_cells = 0;
      uint8_t min_voltage_cell = 0;
      uint8_t max_voltage_cell = 0;

      for (uint8_t i = 0; i < max_cells; i++) {
        uint16_t raw_mv = (uint16_t)((data[i * 2] << 8) | data[(i * 2) + 1]);
        float cell_voltage = raw_mv * 0.001f;

        // Valid lithium cell range. Unused registers normally show 0V/65.535V/nonsense.
        bool valid = cell_voltage >= 2.0f && cell_voltage <= 5.0f;

        switch (i) {
          case 0: id(pack_1_cell_voltage_1).publish_state(valid ? cell_voltage : NAN); break;
          case 1: id(pack_1_cell_voltage_2).publish_state(valid ? cell_voltage : NAN); break;
          case 2: id(pack_1_cell_voltage_3).publish_state(valid ? cell_voltage : NAN); break;
          case 3: id(pack_1_cell_voltage_4).publish_state(valid ? cell_voltage : NAN); break;
          case 4: id(pack_1_cell_voltage_5).publish_state(valid ? cell_voltage : NAN); break;
          case 5: id(pack_1_cell_voltage_6).publish_state(valid ? cell_voltage : NAN); break;
          case 6: id(pack_1_cell_voltage_7).publish_state(valid ? cell_voltage : NAN); break;
          case 7: id(pack_1_cell_voltage_8).publish_state(valid ? cell_voltage : NAN); break;
          case 8: id(pack_1_cell_voltage_9).publish_state(valid ? cell_voltage : NAN); break;
          case 9: id(pack_1_cell_voltage_10).publish_state(valid ? cell_voltage : NAN); break;
          case 10: id(pack_1_cell_voltage_11).publish_state(valid ? cell_voltage : NAN); break;
          case 11: id(pack_1_cell_voltage_12).publish_state(valid ? cell_voltage : NAN); break;
          case 12: id(pack_1_cell_voltage_13).publish_state(valid ? cell_voltage : NAN); break;
          case 13: id(pack_1_cell_voltage_14).publish_state(valid ? cell_voltage : NAN); break;
          case 14: id(pack_1_cell_voltage_15).publish_state(valid ? cell_voltage : NAN); break;
          case 15: id(pack_1_cell_voltage_16).publish_state(valid ? cell_voltage : NAN); break;
        }

        if (!valid) continue;

        valid_cells++;
        total_cell_voltage += cell_voltage;

        if (cell_voltage < min_cell_voltage) {
          min_cell_voltage = cell_voltage;
          min_voltage_cell = i + 1;
        }
        if (cell_voltage > max_cell_voltage) {
          max_cell_voltage = cell_voltage;
          max_voltage_cell = i + 1;
        }
      }

      if (valid_cells == 0) {
        id(pack_1_detected_cell_count).publish_state(0);
        id(pack_1_average_cell_voltage).publish_state(NAN);
        id(pack_1_min_cell_voltage).publish_state(NAN);
        id(pack_1_max_cell_voltage).publish_state(NAN);
        id(pack_1_min_voltage_cell).publish_state(NAN);
        id(pack_1_max_voltage_cell).publish_state(NAN);
        return NAN;
      }

      id(pack_1_detected_cell_count).publish_state(valid_cells);
      id(pack_1_average_cell_voltage).publish_state(total_cell_voltage / valid_cells);
      id(pack_1_min_cell_voltage).publish_state(min_cell_voltage);
      id(pack_1_max_cell_voltage).publish_state(max_cell_voltage);
      id(pack_1_min_voltage_cell).publish_state(min_voltage_cell);
      id(pack_1_max_voltage_cell).publish_state(max_voltage_cell);

      return max_cell_voltage - min_cell_voltage;

  - platform: modbus_controller
