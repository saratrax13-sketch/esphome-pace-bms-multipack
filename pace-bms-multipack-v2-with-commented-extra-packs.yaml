# ============================================================
# NUMERIC SENSORS
# ============================================================
# This section exposes all numeric pack data:
# - Current, voltage, power, SOC, SOH, capacities and cycles
# - Warning/protection/status bitmasks
# - Cell voltages 1-16 for Pack 1 and Slave
# - Auto-detected cell count per pack
# - Calculated min/max/average/delta values
# - Combined battery totals
#
# IMPORTANT DATA-INTEGRITY RULE:
# Live numeric values use timeout filters. If the ESP32 stops receiving fresh
# valid Modbus data, Home Assistant will show unavailable rather than a stale
# last-good reading.

sensor:
  # =========================
  # PACK 1 PACK SENSOR DATA
  # =========================
  # ------------------------------------------------------------
  # PACK 1 PACK CORE ELECTRICAL SENSORS
  # ------------------------------------------------------------
  # Current and voltage are published from one batch Modbus read.
  # Power is calculated as current x voltage.

  - platform: template
    id: pack_1_current
    name: "pack 1 current"
    update_interval: never
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - timeout: ${live_data_timeout}

  - platform: template
    id: pack_1_total_voltage
    name: "pack 1 total voltage"
    update_interval: never
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    id: pack_1_power
    name: "pack 1 power"
    address: 0
    register_type: holding
    value_type: S_WORD
    register_count: 2
    response_size: 4
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      if (data.size() < 4) return NAN;

      float current = (int16_t)((data[0] << 8) | data[1]) * 0.01f;
      float total_voltage = (uint16_t)((data[2] << 8) | data[3]) * 0.01f;

      // PACE/Hubble 13S pack expected range. Keeps bad Modbus reads out of HA.
      if (total_voltage < 40.0f || total_voltage > 58.5f) {
        ESP_LOGW("bms", "pack 1 rejected invalid pack voltage: %.2f", total_voltage);
        return NAN;
      }

      id(pack_1_current).publish_state(current);
      id(pack_1_total_voltage).publish_state(total_voltage);

      return current * total_voltage;

  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    id: pack_1_state_of_charge
    name: "pack 1 state of charge"
    address: 2
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
