  # COMBINED BATTERY CALCULATION NOTES
  # ------------------------------------------------------------
  # Intended for parallel-connected packs.
  # Adds current, power and capacities.
  # Does NOT add voltages; combined pack voltage is averaged.

  # =========================

  # ------------------------------------------------------------
  # OPTIONAL PACK 3 / PACK 4 COMBINED CALCULATION GUIDANCE
  # ------------------------------------------------------------
  # The active combined sensors below currently include Pack 1 + Pack 2 only.
  #
  # When enabling Pack 3 and/or Pack 4, update each combined lambda so it
  # includes the additional pack IDs.
  #
  # Examples:
  #
  # 2-pack current:
  #   return id(pack_1_current).state + id(pack_2_current).state;
  #
  # 3-pack current:
  #   return id(pack_1_current).state + id(pack_2_current).state + id(pack_3_current).state;
  #
  # 4-pack current:
  #   return id(pack_1_current).state + id(pack_2_current).state + id(pack_3_current).state + id(pack_4_current).state;
  #
  # For voltage, average valid pack voltages instead of adding them.
  # For capacity/current/power, add all enabled packs.
  # For min cell voltage, use the lowest value across all enabled packs.
  # For max cell voltage, use the highest value across all enabled packs.
  # For worst delta, use the highest delta across all enabled packs.
  #
  # Keep the "no stale data" rule:
  # If an enabled pack is unavailable, the combined value should return NAN
  # instead of showing a partial combined value.

  # COMBINED BATTERY SENSOR DATA
  # =========================
      - timeout: ${live_data_timeout}
  - platform: template
    id: combined_total_detected_cell_count
    name: "combined total detected cell count"
    unit_of_measurement: "cells"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_detected_cell_count).state;
      float s = id(pack_2_detected_cell_count).state;

      // Combined cell count must represent BOTH packs.
      // If either pack is stale/unavailable, publish NAN instead of a partial total.
      if (isnan(m) || isnan(s) || m <= 0 || s <= 0) return NAN;

      return m + s;

  - platform: template
    id: combined_total_current
    name: "combined total current"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_current).state;
      float s = id(pack_2_current).state;

      // Combined current must be the actual total of BOTH packs.
      // If either pack is stale/unavailable, do not show a partial value.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_total_power
    name: "combined total power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_power).state;
      float s = id(pack_2_power).state;

      // Combined power must be the actual total of BOTH packs.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_average_pack_voltage
    name: "combined average pack voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_total_voltage).state;
      float s = id(pack_2_total_voltage).state;

      // Parallel packs: voltage is averaged, not added.
      // Require BOTH pack voltages so the displayed value is not hiding a failed pack.
      if (isnan(m) || isnan(s)) return NAN;

      return (m + s) / 2.0f;

  - platform: template
    id: combined_total_remaining_capacity
    name: "combined total remaining capacity"
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_remaining_capacity).state;
      float s = id(pack_2_remaining_capacity).state;

      // Capacity total must include BOTH packs.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_total_full_capacity
    name: "combined total full capacity"
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_full_capacity).state;
      float s = id(pack_2_full_capacity).state;

      // Full-capacity total must include BOTH packs.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_total_design_capacity
    name: "combined total design capacity"
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_design_capacity).state;
      float s = id(pack_2_design_capacity).state;

      // Design-capacity total must include BOTH packs.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_state_of_charge
    name: "combined state of charge"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float remaining = id(combined_total_remaining_capacity).state;
      float full = id(combined_total_full_capacity).state;
      if (isnan(remaining) || isnan(full) || full <= 0) return NAN;
      return (remaining / full) * 100.0f;

  - platform: template
    id: combined_state_of_health
    name: "combined state of health"
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float full = id(combined_total_full_capacity).state;
      float design = id(combined_total_design_capacity).state;
      if (isnan(full) || isnan(design) || design <= 0) return NAN;
      float soh = (full / design) * 100.0f;
      if (soh < 0 || soh > 100) return NAN;
      return soh;

  - platform: template
    id: combined_average_cell_voltage
    name: "combined average cell voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float mc = id(pack_1_detected_cell_count).state;
      float sc = id(pack_2_detected_cell_count).state;
      float ma = id(pack_1_average_cell_voltage).state;
      float sa = id(pack_2_average_cell_voltage).state;

      // Weighted average across BOTH packs only.
      // If either pack is stale/unavailable, publish NAN.
      if (isnan(mc) || isnan(sc) || isnan(ma) || isnan(sa) || mc <= 0 || sc <= 0) return NAN;

      return ((ma * mc) + (sa * sc)) / (mc + sc);

  - platform: template
    id: combined_lowest_cell_voltage
    name: "combined lowest cell voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_min_cell_voltage).state;
      float s = id(pack_2_min_cell_voltage).state;

      // Require BOTH packs so a failed pack does not disappear from the combined health view.
      if (isnan(m) || isnan(s)) return NAN;

      return fminf(m, s);

  - platform: template
    id: combined_highest_cell_voltage
    name: "combined highest cell voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_max_cell_voltage).state;
      float s = id(pack_2_max_cell_voltage).state;

      // Require BOTH packs so a failed pack does not disappear from the combined health view.
      if (isnan(m) || isnan(s)) return NAN;

      return fmaxf(m, s);

  - platform: template
    id: combined_worst_delta_cell_voltage
    name: "combined worst delta cell voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(pack_1_delta_cell_voltage).state;
      float s = id(pack_2_delta_cell_voltage).state;

      // Require BOTH packs so the worst-delta value is a true combined health metric.
      if (isnan(m) || isnan(s)) return NAN;

      return fmaxf(m, s);

  # ------------------------------------------------------------
  # ESP32 DIAGNOSTIC SENSORS
  # ------------------------------------------------------------
  # Helps verify Wi-Fi strength and device uptime.

  - platform: wifi_signal
    name: "wifi signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "uptime"
    entity_category: diagnostic

# ============================================================
# TEXT SENSORS
# ============================================================
# Converts raw bitmask registers into readable warning/protection/fault/status
# text, and exposes BMS/version/serial information.

  # =========================
  # PROJECTED RUNTIME / CHARGING TIME
  # =========================
  # Positive current = charging on this PACE Modbus map.
  # Negative current = discharging.
  #
  # These estimates intentionally return NAN when they are not applicable
  # or when source data is unavailable. This keeps the dashboard honest:
  # no stale/fake runtime or charge-time values are shown.
  #
  # Runtime while discharging:
  #   remaining capacity Ah / absolute discharge current A = hours
  #   hours * 60 = minutes shown on dashboard
  #
  # Charging time while charging:
  #   (full capacity Ah - remaining capacity Ah) / charge current A = hours
  #   hours * 60 = minutes shown on dashboard
  #
  # The 1A threshold avoids nonsense values when the battery is near idle.
  # Values are published in minutes so Home Assistant does not round
  # sub-1-hour estimates down to 0 h on dashboard cards.

  - platform: template
    id: pack_1_projected_runtime
    name: "pack 1 projected runtime"
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float current = id(pack_1_current).state;
      float remaining = id(pack_1_remaining_capacity).state;

      if (isnan(current) || isnan(remaining)) return NAN;

      // Runtime only applies when discharging.
      if (current >= -1.0f) return NAN;

      return (remaining / fabs(current)) * 60.0f;

  - platform: template
    id: pack_1_projected_charging_time
    name: "pack 1 projected charging time"
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float current = id(pack_1_current).state;
      float remaining = id(pack_1_remaining_capacity).state;
      float full = id(pack_1_full_capacity).state;

      if (isnan(current) || isnan(remaining) || isnan(full)) return NAN;

      // Charging time only applies when charging.
      if (current <= 1.0f) return NAN;

      float capacity_needed = full - remaining;
      if (capacity_needed <= 0.0f) return 0.0f;

      return (capacity_needed / current) * 60.0f;

  - platform: template
    id: pack_2_projected_runtime
    name: "pack 2 projected runtime"
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float current = id(pack_2_current).state;
      float remaining = id(pack_2_remaining_capacity).state;

      if (isnan(current) || isnan(remaining)) return NAN;

      // Runtime only applies when discharging.
      if (current >= -1.0f) return NAN;

      return (remaining / fabs(current)) * 60.0f;

  - platform: template
    id: pack_2_projected_charging_time
    name: "pack 2 projected charging time"
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float current = id(pack_2_current).state;
      float remaining = id(pack_2_remaining_capacity).state;
      float full = id(pack_2_full_capacity).state;

      if (isnan(current) || isnan(remaining) || isnan(full)) return NAN;

      // Charging time only applies when charging.
      if (current <= 1.0f) return NAN;

      float capacity_needed = full - remaining;
      if (capacity_needed <= 0.0f) return 0.0f;

      return (capacity_needed / current) * 60.0f;


