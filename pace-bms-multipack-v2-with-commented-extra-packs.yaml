  - platform: template
    id: combined_projected_runtime
    name: "combined projected runtime"
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float current = id(combined_total_current).state;
      float remaining = id(combined_total_remaining_capacity).state;

      if (isnan(current) || isnan(remaining)) return NAN;

      // Runtime only applies when the combined bank is discharging.
      if (current >= -1.0f) return NAN;

      return (remaining / fabs(current)) * 60.0f;

  - platform: template
    id: combined_projected_charging_time
    name: "combined projected charging time"
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float current = id(combined_total_current).state;
      float remaining = id(combined_total_remaining_capacity).state;
      float full = id(combined_total_full_capacity).state;

      if (isnan(current) || isnan(remaining) || isnan(full)) return NAN;

      // Charging time only applies when the combined bank is charging.
      if (current <= 1.0f) return NAN;

      float capacity_needed = full - remaining;
      if (capacity_needed <= 0.0f) return 0.0f;

      return (capacity_needed / current) * 60.0f;


text_sensor:
  # ------------------------------------------------------------
  # PACK 1 PACK READABLE BITMASK DECODERS
  # ------------------------------------------------------------
  # Converts raw warning/protection/fault/status bits into readable text.

  - platform: modbus_controller
    modbus_controller_id: bms_pack_1
    name: "pack 1 warnings"
    address: 9
    register_type: holding
    register_count: 1
    response_size: 2
    raw_encode: HEXBYTES
    lambda: |-
      static const uint8_t FLAGS_SIZE = 16;
      static const char *const FLAGS[FLAGS_SIZE] = {
          "Cell overvoltage",
          "Cell undervoltage",
          "Pack overvoltage",
          "Pack undervoltage",
          "Charging overcurrent",
          "Discharging overcurrent",
          "Reserve (Bit 7)",
          "Reserve (Bit 8)",
          "Charging overtemperature",
          "Discharging overtemperature",
          "Charging undertemperature",
          "Discharging undertemperature",
          "Environment overtemperature",
          "Environment undertemperature",
          "MOSFET overtemperature",
          "Low state of charge"
      };
      std::string values = "";
      uint16_t mask = modbus::helpers::word_from_hex_str(x, 0);
      if (mask) {
        for (int i = 0; i < FLAGS_SIZE + 0; i++) {
          if (mask & (1 << i)) {
            values.append(FLAGS[i - 0]);
            values.append(";");
          }
        }
        if (!values.empty()) values.pop_back();
      }
      return values;

